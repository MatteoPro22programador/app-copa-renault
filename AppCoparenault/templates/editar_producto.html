<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>Editar Producto</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/admin_forms.css') }}">

</head>
<body>

<div class="admin-page">

    <div class="admin-form-box">

        <h1>Editar Producto</h1>

        <form method="POST"
        enctype="multipart/form-data"
        class="admin-form">

            <div class="admin-group">

                <label>Nombre</label>

                <input type="text"
                name="nombre"
                value="{{ prod.nombre }}"
                required>

            </div>

            <div class="admin-group">

                <label>Descripción</label>

                <textarea
                name="descripcion">{{ prod.descripcion }}</textarea>

            </div>

            <div class="admin-group">

                <label>Precio</label>

                <input type="number"
                step="0.01"
                name="precio"
                value="{{ prod.precio }}"
                required>

            </div>

            <div class="admin-group">

                <label>Stock</label>

                <input type="number"
                name="stock"
                value="{{ prod.stock }}">

            </div>

            <div class="admin-group">

                <label>Sección</label>

                <select name="seccion_id" required>

                    {% for seccion in secciones %}

                    <option value="{{ seccion.id }}"
                    {% if seccion.id == prod.seccion_id %}selected{% endif %}>
                        {{ seccion.nombre }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <!-- IMAGEN ACTUAL -->
            {% if prod.imagen %}

            <div class="admin-group">

                <label>Imagen actual</label>

                <img src="{{ url_for('static', filename='uploads/' + prod.imagen) }}"
                style="width:120px;border-radius:10px;display:block;margin-bottom:10px;">

            </div>

            {% endif %}

            <div class="admin-group">

                <label>Cambiar imagen (opcional)</label>

                <input type="file"
                name="imagen">

            </div>

            <label class="admin-checkbox">

                <input type="checkbox"
                name="activo"
                {% if prod.activo %}checked{% endif %}>

                Producto activo

            </label>

            <button type="submit"
            class="admin-btn">

                Guardar cambios

            </button>

        </form>

    </div>

</div>

</body>
</html>
